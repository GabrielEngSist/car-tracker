services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: cartracker
      POSTGRES_USER: car
      POSTGRES_PASSWORD: car
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U car -d cartracker"]
      interval: 2s
      timeout: 3s
      retries: 30

  consultarplaca-mock:
    image: wiremock/wiremock:3.9.1
    command: ["--global-response-templating", "--verbose"]
    ports:
      - "8086:8080"
    volumes:
      - ./tests/integration/mocks/wiremock:/home/wiremock

  api:
    build:
      context: .
      dockerfile: ./src/Car.Tracker.Api/Dockerfile
    environment:
      ASPNETCORE_URLS: http://0.0.0.0:8080
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__CarTracker: Host=postgres;Database=cartracker;Username=car;Password=car;Port=5432;SSL Mode=Disable
      ConsultarPlaca__Url: http://consultarplaca-mock:8080
      ConsultarPlaca__Email: test@example.com
      ConsultarPlaca__ApiKey: test
    ports:
      - "8085:8080"
    depends_on:
      postgres:
        condition: service_healthy
      consultarplaca-mock:
        condition: service_started

